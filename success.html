<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Thanh toan thanh cong - K-Pop Store</title>
        <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.4/css/all.css" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/responsive.css" />
    </head>
    <body>
        <!-- Giữ thanh điều hướng chuẩn để hỗ trợ mua tiếp ngay sau khi thanh toán thành công -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="navbar-brand text-upper" href="index.html">K-Pop Store</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                    <ul class="navbar-nav align-items-center gap-1">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item">
                            <a class="cart-nav-link" href="cart.html"
                                >Cart <span class="cart-badge" id="cartBadge">0</span></a
                            >
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main>
            <div class="container">
                <!-- Tách phần xác nhận thành công khỏi phần tải về để giảm lo lắng sau thanh toán -->
                <div class="success-box">
                    <div class="success-icon"><i class="fas fa-check"></i></div>
                    <h2>Thanh toan thanh cong!</h2>
                    <p>Cam on ban da mua hang. Hay tai nhac va thuong thuc ngay!</p>
                </div>

                <!-- Nội dung đã mua được render từ local storage để tránh phụ thuộc thêm vào mạng -->
                <div id="purchasedContent"></div>

                <div class="text-center mt-5 mb-4">
                    <a href="index.html" class="btn-pill btn-pill-outline"
                        ><i class="fas fa-arrow-left"></i> Tiep tuc mua sam</a
                    >
                </div>
            </div>
        </main>

        <!-- Footer giữ tối giản để thao tác tải về vẫn là trọng tâm thị giác -->
        <footer class="footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 K-Pop Store. Made with <i class="fas fa-heart"></i> by fans.</p>
                </div>
            </div>
        </footer>

        <div class="toast-container" id="toastContainer"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/cart.js"></script>
        <script>
            (function () {
                var items = Cart.getPurchased();
                var content = document.getElementById('purchasedContent');

                if (items.length === 0) {
                    // Trường hợp này xảy ra khi storage bị xóa, nên cần xử lý êm để tránh hiện liên kết hỏng.
                    content.innerHTML =
                        '<div class="empty-state"><h3>Khong co san pham nao</h3><p>Ban chua mua san pham nao.</p></div>';
                    return;
                }

                var html = '<h3 class="section-title mt-4"><i class="fas fa-music"></i> Nhac cua ban</h3>';

                items.forEach(function (item) {
                    html +=
                        '<div class="download-item">' +
                        '<div class="cart-item-image"><img src="' +
                        item.cover +
                        '" alt="' +
                        item.title +
                        '"></div>' +
                        '<div class="download-info">' +
                        '<h4>' +
                        item.title +
                        '</h4>' +
                        '<p>' +
                        item.artist +
                        '</p>' +
                        '</div>' +
                        '<div class="download-actions">' +
                        '<a href="' +
                        (item.download || '#') +
                        '" class="btn-pill btn-pill-filled btn-pill-sm"><i class="fas fa-download"></i> MP3</a>' +
                        '<a href="' +
                        (item.download || '#') +
                        '" class="btn-pill btn-pill-outline btn-pill-sm"><i class="fas fa-download"></i> FLAC</a>' +
                        '</div>' +
                        '</div>';
                });

                content.innerHTML = html;
            })();
        </script>
        <script src="js/chat.js"></script>
    </body>
</html>
