<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chi tiet san pham - K-Pop Store</title>
        <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.4/css/all.css" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/responsive.css" />
    </head>
    <body>
        <!-- Dùng lại cùng cấu trúc điều hướng giúp người dùng giữ định hướng xuyên suốt luồng mua hàng -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="navbar-brand text-upper" href="index.html">K-Pop Store</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                    <ul class="navbar-nav align-items-center gap-1">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Collections</a></li>
                        <li class="nav-item">
                            <a class="cart-nav-link" href="cart.html"
                                >Cart <span class="cart-badge" id="cartBadge">0</span></a
                            >
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main>
            <div class="container">
                <div class="page-header">
                    <div class="breadcrumb-custom">
                        <a href="index.html">Trang chu</a> / <span id="breadcrumbTitle">...</span>
                    </div>
                </div>

                <div class="row g-4 product-detail" id="productDetail">
                    <!-- Được render bằng JS -->
                </div>
            </div>
        </main>

        <!-- Footer tối giản ở trang chi tiết giúp giảm nhiễu nhưng vẫn giữ liên kết quay lại -->
        <footer class="footer">
            <div class="container">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <h5>K-Pop Store</h5>
                        <p>Cua hang nhac so K-Pop hang dau.</p>
                    </div>
                    <div class="col-md-3 mb-3">
                        <h5>Lien ket</h5>
                        <ul>
                            <li><a href="index.html">Trang chu</a></li>
                            <li><a href="cart.html">Gio hang</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 K-Pop Store. Made with <i class="fas fa-heart"></i> by fans.</p>
                </div>
            </div>
        </footer>

        <div class="toast-container" id="toastContainer"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/cart.js"></script>
        <script>
            (function () {
                var params = new URLSearchParams(window.location.search);
                var productId = params.get('id');

                if (!productId) {
                    // Query param có thể thiếu khi người dùng sửa URL thủ công, nên cần fail-safe với lối quay lại rõ ràng.
                    document.getElementById('productDetail').innerHTML =
                        '<div class="col-12"><div class="empty-state"><h3>Khong tim thay san pham</h3><p><a href="index.html">Quay lai trang chu</a></p></div></div>';
                    return;
                }

                fetch('data/products.json')
                    .then(function (res) {
                        return res.json();
                    })
                    .then(function (products) {
                        var product = products.find(function (p) {
                            return p.id === productId;
                        });
                        if (!product) {
                            // Xử lý deep link cũ giúp tránh render bố cục chi tiết bị lỗi.
                            document.getElementById('productDetail').innerHTML =
                                '<div class="col-12"><div class="empty-state"><h3>San pham khong ton tai</h3><p><a href="index.html">Quay lai trang chu</a></p></div></div>';
                            return;
                        }

                        document.title = product.title + ' - ' + product.artist + ' | K-Pop Store';
                        document.getElementById('breadcrumbTitle').textContent = product.title;

                        document.getElementById('productDetail').innerHTML =
                            '<div class="col-md-6">' +
                            '<div class="detail-image"><img src="' +
                            product.cover +
                            '" alt="' +
                            product.title +
                            '"></div>' +
                            '</div>' +
                            '<div class="col-md-6">' +
                            '<div class="pt-2">' +
                            '<div class="detail-artist">' +
                            product.artist +
                            '</div>' +
                            '<h1 class="detail-title">' +
                            product.title +
                            '</h1>' +
                            '<span class="detail-type">' +
                            product.type +
                            '</span>' +
                            '<div class="detail-price mt-3">' +
                            Cart.formatPrice(product.price) +
                            '</div>' +
                            '<div class="detail-formats">' +
                            product.format
                                .map(function (f) {
                                    return '<span>' + f + '</span>';
                                })
                                .join('') +
                            '</div>' +
                            '<div class="detail-actions">' +
                            '<button class="btn-pill btn-pill-filled" id="addToCartBtn"><i class="fas fa-cart-plus"></i> Add to Cart</button>' +
                            '<a href="index.html" class="btn-pill btn-pill-outline"><i class="fas fa-arrow-left"></i> Tiep tuc mua sam</a>' +
                            '</div>' +
                            '<p class="detail-description">Nhac so chat luong cao tu ' +
                            product.artist +
                            '. Co san dinh dang ' +
                            product.format.join(', ') +
                            '. Tai ve ngay sau khi thanh toan.</p>' +
                            '</div>' +
                            '</div>';

                        document.getElementById('addToCartBtn').addEventListener('click', function () {
                            // Trang chi tiết luôn thêm 1 sản phẩm để CTA này giữ hành vi ổn định và nhanh.
                            Cart.addToCart(product);
                        });
                    });
            })();
        </script>
        <script src="js/chat.js"></script>
    </body>
</html>
