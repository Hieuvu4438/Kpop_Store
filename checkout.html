        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.15.4/css/all.css" />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/responsive.css" />

    <body>
        <!-- Giữ thanh điều hướng trên cùng để người dùng rời trang thanh toán mà không mơ hồ với nút Back -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="navbar-brand text-upper" href="index.html">K-Pop Store</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                    <ul class="navbar-nav align-items-center gap-1">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item">
                            <a class="cart-nav-link" href="cart.html"
                                >Cart <span class="cart-badge" id="cartBadge">0</span></a
                            >
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main>
            <div class="container">
                <div class="page-header">
                    <h1>Thanh toan</h1>
                    <div class="breadcrumb-custom">

                <div id="checkoutContent"></div>

            <p>Dang xac nhan giao dich...</p>
        </div>

        <!-- Footer mỏng chừa không gian cho tóm tắt thanh toán và vùng QR ở phần nhìn thấy đầu tiên -->
        <footer class="footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 K-Pop Store. Made with <i class="fas fa-heart"></i> by fans.</p>
                </div>
            </div>
        </footer>

        <div class="toast-container" id="toastContainer"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/cart.js"></script>
