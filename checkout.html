<!doctype html>
<html lang="vi">
    <head>
        <!-- =====================================================================
             TRANG THANH TOÁN — K-Pop Music Store (checkout.html)
             Chức năng: Hiển thị giao diện thanh toán (QR Code, thông tin đơn hàng).
             Toàn bộ nội dung được render bởi checkout.js — trang này chỉ là shell.
             
             Luồng thanh toán:
               cart.html → checkout.html → [checkout.js xử lý] → success.html
             
             Luồng dữ liệu:
               checkout.js đọc Cart.getCart() → render form xác nhận và QR
               Khi xác nhận: Cart.checkout() → clear cart → redirect success.html
        ====================================================================== -->

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Thanh toán - K-Pop Store</title>

        <!-- Favicon SVG dùng chung -->
        <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

        <!-- SEO: mô tả trang thanh toán -->
        <meta name="description" content="Thanh toán đơn hàng nhạc số K-Pop qua QR Code ngân hàng hoặc Momo." />

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

        <!-- Font Awesome — icon loading spinner, checkmark... -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

        <!-- CSS tùy biến -->
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/components.css" />
        <link rel="stylesheet" href="css/responsive.css" />
    </head>
    <body>

        <!-- ===================================================================
             NAVBAR — Dùng lại cấu trúc chung.
             Thanh toán là bước cuối luồng mua hàng, không có "active" nav item.
             Vẫn hiển thị giỏ hàng để người dùng có thể quay lại nếu cần.
        =================================================================== -->
        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="navbar-brand text-upper" href="index.html">K-Pop Store</a>

                <!-- Hamburger button cho mobile -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                    <ul class="navbar-nav align-items-center gap-1">
                        <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Giới thiệu</a></li>
                        <!-- Giỏ hàng vẫn hiển thị để người dùng thoát ra kiểm tra lại nếu cần -->
                        <li class="nav-item">
                            <a class="cart-nav-link" href="cart.html">
                                <i class="fas fa-shopping-cart"></i> Giỏ hàng <span class="cart-badge" id="cartBadge">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- ===================================================================
             NỘI DUNG CHÍNH — Vùng thanh toán
             #checkoutContent: placeholder rỗng, checkout.js sẽ render nội dung:
               - Nếu giỏ rỗng: hiển thị empty-state chuyển về giỏ hàng
               - Nếu có hàng: hiển thị danh sách đơn hàng + QR thanh toán +
                              nút "Xác nhận" giả lập thanh toán thành công
        =================================================================== -->
        <main>
            <div class="container">
                <!-- Tiêu đề + breadcrumb điều hướng 3 cấp -->
                <div class="page-header">
                    <h1>Thanh toán</h1>
                    <div class="breadcrumb-custom">
                        <!-- Breadcrumb: Trang chủ > Giỏ hàng > Thanh toán -->
                        <a href="index.html">Trang chủ</a> / <a href="cart.html">Giỏ hàng</a> / Thanh toán
                    </div>
                </div>

                <!-- Placeholder cho checkout.js render nội dung thanh toán -->
                <div id="checkoutContent"></div>
            </div>
        </main>

        <!-- ===================================================================
             LOADING OVERLAY — Lớp phủ bán trong suốt che toàn trang.
             Hiển thị khi người dùng nhấn "Xác nhận thanh toán" để:
               1. Ngăn bấm lại nút (tránh double-submit)
               2. Cho người dùng thấy đang xử lý
             checkout.js toggle display: none ↔ flex cho phần tử này.
        =================================================================== -->
        <div class="loading-overlay" id="loadingOverlay" style="display: none">
            <div class="spinner"></div>
            <p>Đang xác nhận giao dịch...</p>
        </div>

        <!-- ===================================================================
             FOOTER RÚT GỌN — Chỉ gồm dòng bản quyền.
             Checkout không cần nhiều link distraction — tập trung vào hoàn tất đơn.
        =================================================================== -->
        <footer class="footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 K-Pop Store. Được tạo với <i class="fas fa-heart"></i> bởi những người yêu nhạc Hàn.</p>
                </div>
            </div>
        </footer>

        <!-- Toast container — hiển thị thông báo lỗi hoặc xác nhận -->
        <div class="toast-container" id="toastContainer"></div>

        <!-- Bootstrap Bundle JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- cart.js: nạp trước checkout.js — cung cấp Cart API mà checkout.js cần
             (Cart.getCart, Cart.getCartTotal, Cart.formatPrice, Cart.checkout...) -->
        <script src="js/cart.js"></script>

        <!-- checkout.js: render giao diện thanh toán, xử lý xác nhận, redirect success -->
        <script src="js/checkout.js"></script>

        <!-- chat.js: widget hỗ trợ khách hàng -->
        <script src="js/chat.js"></script>
    </body>
</html>
